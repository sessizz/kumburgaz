<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Çevrimdışı - Kumburgaz</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#2563eb" />
    <style>
        html, body { margin: 0; height: 100%; font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; background: #f3f4f6; color: #111827; }
        .wrap { min-height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 24px; }
        .icon { width: 72px; height: 72px; border-radius: 20px; background: #2563eb; display: flex; align-items: center; justify-content: center; margin-bottom: 18px; }
        h1 { font-size: 20px; margin: 0 0 8px; }
        p { color: #6b7280; font-size: 14px; margin: 0 0 20px; max-width: 320px; }
        button { background: #2563eb; color: #fff; border: none; border-radius: 12px; padding: 12px 22px; font-size: 15px; font-weight: 600; }
        button:active { background: #1d4ed8; }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="icon">
            <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 21h18" /><path d="M5 21V7l7-4 7 4v14" /><path d="M9 9h.01M15 9h.01M9 13h.01M15 13h.01M9 17h.01M15 17h.01" />
            </svg>
        </div>
        <h1>Çevrimdışısınız</h1>
        <p>İnternet bağlantısı kurulamadı. Bağlantınızı kontrol edip tekrar deneyin.</p>
        <button onclick="location.reload()">Yeniden dene</button>
    </div>
</body>
</html>
